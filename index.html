<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TU Network Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --gold: #FFFFFF;
    --gold-light: #FFFFFF;
    --dark: #0A0A0A;
    --dark2: #111111;
    --dark3: #1A1A1A;
    --dark4: #222222;
    --text: #E8E8E8;
    --muted: #888;
    --accent: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GATE ── */
  #gate {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  .gate-inner {
    width: 90%; max-width: 420px;
    text-align: center;
    animation: fadeUp .6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .gate-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 4px;
  }

  .gate-sub {
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
    line-height: 2;
  }

  .gate-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .gate-input {
    width: 100%;
    padding: 16px 20px;
    background: var(--dark3);
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 16px;
  }

  .gate-input:focus { border-color: var(--gold); }

  .gate-btn {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    color: #111;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }

  .gate-btn:hover { background: #e0e0e0; }
  .gate-btn:active { transform: scale(0.98); }

  .gate-error {
    margin-top: 12px;
    font-size: 12px;
    color: #e05a5a;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity .3s;
  }
  .gate-error.show { opacity: 1; }

  /* ── APP ── */
  #app { display: none; flex-direction: column; height: 100vh; }

  header {
    background: var(--dark2);
    border-bottom: 1px solid #222;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    flex-shrink: 0;
    z-index: 500;
  }

  .header-brand {
    display: flex; align-items: baseline; gap: 10px;
  }

  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand-tag {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-right {
    display: flex; align-items: center; gap: 12px;
  }

  .member-count {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 14px;
    border: 1px solid #333;
    border-radius: 100px;
  }

  .member-count span {
    color: var(--gold);
    font-weight: 600;
  }

  .search-wrap {
    position: relative;
  }

  .search-input {
    background: var(--dark3);
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 8px 16px 8px 36px;
    outline: none;
    width: 220px;
    transition: border-color .2s, width .3s;
  }

  .search-input:focus { border-color: var(--gold); width: 260px; }

  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* leaflet overrides */
  .leaflet-container {
    background: #0d0d0d !important;
    font-family: 'DM Sans', sans-serif !important;
  }

  .leaflet-tile { filter: brightness(0.6) saturate(0.4) hue-rotate(10deg); }

  /* custom marker */
  .tu-marker {
    width: 28px; height: 28px;
    background: var(--gold);
    border: 2px solid #333;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    color: #111;
    cursor: pointer;
    transition: transform .15s;
    box-shadow: 0 2px 8px rgba(255,255,255,.15);
  }

  .tu-marker:hover { transform: scale(1.25); }

  .tu-marker-cluster {
    background: var(--gold);
    border: 2px solid var(--dark);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--dark);
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(255,255,255,.2);
  }

  /* popup */
  .leaflet-popup-content-wrapper {
    background: var(--dark3) !important;
    border: 1px solid #333 !important;
    border-radius: 12px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,.6) !important;
    padding: 0 !important;
  }

  .leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
  }

  .leaflet-popup-tip {
    background: var(--dark3) !important;
  }

  .popup-inner {
    padding: 16px 18px;
    min-width: 200px;
  }

  .popup-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--gold-light);
    margin-bottom: 4px;
  }

  .popup-location {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 5px;
  }

  .popup-phone {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }

  .popup-phone a {
    color: var(--gold);
    text-decoration: none;
  }

  .popup-notes {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    border-top: 1px solid #2a2a2a;
    padding-top: 8px;
    margin-top: 4px;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 300px;
    background: var(--dark2);
    border-left: 1px solid #1e1e1e;
    overflow-y: auto;
    flex-shrink: 0;
    z-index: 2;
  }

  @media (max-width: 640px) {
    #sidebar { display: none; }
    .search-input { width: 160px; }
    .search-input:focus { width: 180px; }
  }

  .sidebar-header {
    padding: 16px;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid #1e1e1e;
    position: sticky; top: 0;
    background: var(--dark2);
    z-index: 10;
  }

  .member-card {
    padding: 14px 16px;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    transition: background .15s;
  }

  .member-card:hover { background: var(--dark3); }
  .member-card.active { background: var(--dark4); border-left: 2px solid var(--gold); }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .card-loc {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .card-phone {
    font-size: 12px;
    color: var(--gold);
    font-weight: 500;
  }

  .no-loc-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: #2a2a2a;
    color: #666;
    padding: 2px 6px;
    border-radius: 4px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-inner">
    <div class="gate-logo">TU</div>
    <div class="gate-sub">Titanium University<br>Member Network</div>
    <div class="gate-label">Enter passphrase to continue</div>
    <input type="password" class="gate-input" id="passInput" placeholder="••••••••••••" autocomplete="off" />
    <button class="gate-btn" onclick="checkPass()">Access Network</button>
    <div class="gate-error" id="gateError">Incorrect passphrase. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-brand">
      <div class="brand-name">TU Network</div>
      <div class="brand-tag">Member Map</div>
    </div>
    <div class="header-right">
      <div class="member-count"><span id="visibleCount">107</span> members</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search name or city..." oninput="filterMembers()" />
      </div>
    </div>
  </header>

  <div class="main">
    <div id="map"></div>
    <div id="sidebar">
      <div class="sidebar-header">All Members</div>
      <div id="memberList"></div>
    </div>
  </div>
</div>

// ── GATE ──
function checkPass() {
  const val = document.getElementById('passInput').value.trim();
  if (val === PASSPHRASE) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initMap();
  } else {
    const err = document.getElementById('gateError');
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 3000);
  }
}

document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPass();
});

// ── MAP ──
let map, markers = [], currentFilter = '';

function initMap() {
  map = L.map('map', {
    center: [38, -96],
    zoom: 4,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 18,
  }).addTo(map);

  renderAll(MEMBERS);
  buildSidebar(MEMBERS);
}

function makeIcon(initials) {
  return L.divIcon({
    html: `<div class="tu-marker">${initials}</div>`,
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16],
  });
}

function getInitials(name) {
  const parts = name.split(' ');
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

function makePopup(m) {
  return `<div class="popup-inner">
    <div class="popup-name">${m.name}</div>
    ${m.location ? `<div class="popup-location">📍 ${m.location}</div>` : ''}
    <div class="popup-phone">📞 <a href="tel:${m.phone}">${m.phone}</a></div>
    ${m.notes ? `<div class="popup-notes">${m.notes}</div>` : ''}
  </div>`;
}

function renderAll(list) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  list.forEach((m, i) => {
    if (m.lat && m.lng) {
      const marker = L.marker([m.lat, m.lng], { icon: makeIcon(getInitials(m.name)) })
        .bindPopup(makePopup(m), { maxWidth: 280 })
        .addTo(map);
      marker._memberId = i;
      markers.push(marker);
    }
  });
}

function buildSidebar(list) {
  const container = document.getElementById('memberList');
  container.innerHTML = '';
  document.getElementById('visibleCount').textContent = list.length;

  list.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'member-card';
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-name">${m.name}</div>
      <div class="card-loc">${m.location || '<span class="no-loc-badge">No location</span>'}</div>
      <div class="card-phone">${m.phone}</div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.member-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      if (m.lat && m.lng) {
        map.flyTo([m.lat, m.lng], 10, { duration: 1.2 });
        // find and open popup
        markers.forEach(mk => {
          if (mk._memberId === i) mk.openPopup();
        });
      }
    });
    container.appendChild(card);
  });
}

function filterMembers() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = MEMBERS.filter(m =>
    m.name.toLowerCase().includes(q) ||
    m.location.toLowerCase().includes(q) ||
    m.phone.includes(q) ||
    (m.notes && m.notes.toLowerCase().includes(q))
  );
  renderAll(filtered);
  buildSidebar(filtered);
}
